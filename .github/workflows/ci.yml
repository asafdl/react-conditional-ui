name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]

jobs:
    lint-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"
                  cache: npm

            - run: npm ci

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Test with coverage
              run: npm run test:coverage

            - name: Extract coverage percentage
              id: coverage
              run: |
                  COVERAGE=$(node -e "
                    import { readFileSync } from 'fs';
                    const r = JSON.parse(readFileSync('./coverage/coverage-summary.json', 'utf8'));
                    console.log(r.total.lines.pct);
                  " --input-type=module)
                  echo "pct=$COVERAGE" >> "$GITHUB_OUTPUT"

            - name: Create coverage badge
              uses: schneegans/dynamic-badges-action@v1.7.0
              if: github.ref == 'refs/heads/master'
              with:
                  auth: ${{ secrets.GIST_TOKEN }}
                  gistID: ${{ vars.COVERAGE_GIST_ID }}
                  filename: coverage.json
                  label: coverage
                  message: "${{ steps.coverage.outputs.pct }}%"
                  valColorRange: ${{ steps.coverage.outputs.pct }}
                  maxColorRange: 100
                  minColorRange: 0
